<script>
document.querySelector('form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const fullName = document.querySelector('input[placeholder*="Name"], input[type="text"]')?.value || "N/A";
    const mobile = document.querySelector('input[placeholder*="Mobile"], input[type="tel"]')?.value || "N/A";
    const email = document.querySelector('input[type="email"]')?.value || "N/A";
    const category = document.querySelector('select')?.value || "Technical";
    const description = document.querySelector('textarea')?.value || "N/A";

    const telegramMessage = `🚨 New Support Request!\n\n` +
                            `👤 Name: ${fullName}\n` +
                            `📱 Mobile: ${mobile}\n` +
                            `✉️ Email: ${email}\n` +
                            `📌 Category: ${category}\n` +
                            `💬 Description: ${description}\n\n` +
                            `🕒 Time: ${new Date().toLocaleString('en-IN')}`;

    const token = "8793008642:AAGcC6Au2jvT9Ak9ixeP1rFmA1ZylhCnSho";
    const chatId = "8400052598";

    const url = `https://api.telegram.org/bot${token}/sendMessage`;

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: chatId,
                text: telegramMessage,
                parse_mode: "HTML"
            })
        });

        if (response.ok) {
            alert("✅ Request Submitted Successfully! Hamari team jaldi contact karegi.");
            this.reset();
        } else {
            alert("❌ Submission failed. Please try again.");
        }
    } catch (err) {
        alert("❌ Network error! Internet check karein.");
    }
});
</script>
